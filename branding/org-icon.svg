<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Misskey brand gradient (same as misskey-dev org avatar background) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86b300"/>
      <stop offset="100%" stop-color="#4ab300"/>
    </linearGradient>
    <!-- Soft white shading for the embossed logo -->
    <linearGradient id="stamp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e4eadb"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Embossed shadow (offset copy, translucent dark green) -->
  <g transform="translate(252,280) scale(0.5)" fill="#1c4400" opacity="0.16">
    <rect x="72" y="136" width="100" height="280" rx="36"/>
    <rect x="206" y="136" width="100" height="280" rx="36"/>
    <rect x="340" y="136" width="100" height="280" rx="36"/>
    <path d="M136,136 L168,200 Q189,236 210,200 L242,136 Z"/>
    <path d="M270,136 L302,200 Q323,236 344,200 L376,136 Z"/>
    <path d="M122,140 L120,118" fill="none" stroke="#1c4400" stroke-width="7" stroke-linecap="round"/>
    <path d="M120,118 Q 148,60 44,56 Q 80,118 120,118 Z"/>
  </g>

  <!-- White notedeck M stamp, bottom-right (misskey-dev style) -->
  <g transform="translate(252,272) scale(0.5)" fill="url(#stamp)">
    <rect x="72" y="136" width="100" height="280" rx="36"/>
    <rect x="206" y="136" width="100" height="280" rx="36"/>
    <rect x="340" y="136" width="100" height="280" rx="36"/>
    <path d="M136,136 L168,200 Q189,236 210,200 L242,136 Z"/>
    <path d="M270,136 L302,200 Q323,236 344,200 L376,136 Z"/>
    <path d="M122,140 L120,118" fill="none" stroke="#f2f6ec" stroke-width="7" stroke-linecap="round"/>
    <path d="M120,118 Q 148,60 44,56 Q 80,118 120,118 Z"/>
  </g>
</svg>
