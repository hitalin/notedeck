app-id: com.notedeck.desktop
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: notedeck

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-config/notedeck:create

modules:
  - name: notedeck
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
      env:
        CARGO_HOME: /run/build/notedeck/cargo
        npm_config_nodedir: /usr/lib/sdk/node22
    build-commands:
      - corepack enable && corepack prepare pnpm@latest --activate
      - pnpm install --frozen-lockfile
      - pnpm build
      - cd src-tauri && cargo build --release
      - install -Dm755 src-tauri/target/release/notedeck ${FLATPAK_DEST}/bin/notedeck
      - install -Dm644 src-tauri/icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.notedeck.desktop.png
      - install -Dm644 src-tauri/icons/32x32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/com.notedeck.desktop.png
      - install -Dm644 src-tauri/icons/icon.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/com.notedeck.desktop.svg
      - install -Dm644 packaging/flatpak/com.notedeck.desktop.desktop ${FLATPAK_DEST}/share/applications/com.notedeck.desktop.desktop
      - install -Dm644 packaging/flatpak/com.notedeck.desktop.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.notedeck.desktop.metainfo.xml
    sources:
      - type: git
        url: https://github.com/hitalin/notedeck.git
        tag: v0.1.3
