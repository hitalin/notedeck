<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NoteDeck</title>
    <style>
      #nd-splash{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:var(--nd-bg,#232323);transition:opacity .3s cubic-bezier(.16,1,.3,1);overflow:hidden}
      #nd-splash.nd-splash-leaving{opacity:0}
      #nd-splash.nd-splash-leaving svg{transform:scale(.8);opacity:0}
      #nd-splash svg{transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .2s ease-out}
      #nd-splash svg{animation:nd-jelly 2s ease-in-out infinite,nd-glow 2.5s ease-in-out infinite}
      /* 待機: ジェリー揺れ + レインボーグロー */
      @keyframes nd-jelly{0%,100%{transform:scale(1,1)}20%{transform:scale(1.06,.94)}40%{transform:scale(.94,1.06)}60%{transform:scale(1.03,.97)}80%{transform:scale(.97,1.03)}}
      @keyframes nd-glow{0%,100%{filter:none}50%{filter:drop-shadow(0 0 16px #86b30060)}}
      @media(prefers-reduced-motion:reduce){#nd-splash svg{animation:none;transition:none}#nd-splash{transition:none}}
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Linear-style instant display: restore cached UI shell, or show splash.
      (function () {
        var root = document.documentElement
        try {
          // 1. Restore theme CSS variables (same data themeStore.init reads later)
          var compiled = localStorage.getItem('nd-theme-compiled')
          if (compiled) {
            var vars = JSON.parse(compiled)
            for (var k in vars) {
              if (Object.prototype.hasOwnProperty.call(vars, k)) {
                root.style.setProperty('--nd-' + k, vars[k])
              }
            }
            if (vars.bg) {
              var hex = vars.bg.replace('#', '')
              if (hex.length === 6) {
                var r = parseInt(hex.slice(0, 2), 16)
                var g = parseInt(hex.slice(2, 4), 16)
                var b = parseInt(hex.slice(4, 6), 16)
                var isLight = (r * 299 + g * 587 + b * 114) / 1000 > 128
                root.style.setProperty('color-scheme', isLight ? 'light' : 'dark')
                root.dataset.colorScheme = isLight ? 'light' : 'dark'
              }
            }
          }
          // 2. Restore cached HTML shell — or fall back to splash screen
          var shellVersion = localStorage.getItem('nd-shell-cache-version')
          var shell = shellVersion === '__ND_APP_VERSION__'
            ? localStorage.getItem('nd-shell-cache')
            : null
          if (shell) {
            document.getElementById('app').innerHTML = shell
            root.dataset.shellCached = ''
          } else if (shellVersion) {
            localStorage.removeItem('nd-shell-cache')
            localStorage.removeItem('nd-shell-cache-version')
          }
        } catch (e) {
          // Corrupt cache — fall through to splash
        }
        // 3. Show splash only when no cache is available (first launch)
        if (!root.dataset.shellCached) {
          var splash = document.createElement('div')
          splash.id = 'nd-splash'
          splash.innerHTML = '<svg width="48" height="48" viewBox="0 0 512 512"><defs><linearGradient id="fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#aad635"/><stop offset="100%" stop-color="#7ab800"/></linearGradient></defs><g fill="url(#fg)"><rect x="72" y="136" width="100" height="280" rx="36"/><rect x="206" y="136" width="100" height="280" rx="36"/><rect x="340" y="136" width="100" height="280" rx="36"/><polygon points="136,136 189,224 242,136"/><polygon points="270,136 323,224 376,136"/></g></svg>'
          document.body.prepend(splash)
        }
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
