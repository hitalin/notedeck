version: '3'

tasks:
  dev:
    desc: Vite development server
    cmd: pnpm vite dev

  dev:tauri:
    desc: Tauri + Vite development
    cmd: pnpm tauri dev

  build:
    desc: Production build (for Tauri embedding)
    cmd: pnpm vue-tsc -b && pnpm vite build

  build:tauri:
    desc: Tauri native build
    cmd: pnpm tauri build

  android:sync:
    desc: Sync custom Android files to gen/
    cmd: ./src-tauri/android/sync.sh

  android:dev:
    desc: Tauri Android development
    deps: [android:sync]
    cmd: pnpm tauri android dev

  android:build:
    desc: Tauri Android production build
    deps: [android:sync]
    cmd: pnpm tauri android build

  test:
    desc: Run unit tests
    cmd: pnpm vitest run

  test:watch:
    desc: Run unit tests in watch mode
    cmd: pnpm vitest

  lint:
    desc: Lint and format check
    cmd: pnpm biome check .

  lint:fix:
    desc: Lint and format fix
    cmd: pnpm biome check --write .

  typecheck:
    desc: TypeScript type check
    cmd: pnpm vue-tsc --noEmit

  changelog:
    desc: Generate changelog from git log (since last tag)
    cmd: git log $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD --pretty=format:"- %s" --no-merges

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
      - rm -rf src-tauri/target
