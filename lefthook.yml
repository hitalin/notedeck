pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,vue}"
      run: npx biome check --no-errors-on-unmatched {staged_files}

    - name: typecheck
      run: npx vue-tsc -b --noEmit

commit-msg:
  jobs:
    - name: conventional-commits
      run: |
        msg=$(head -1 "{1}")
        if ! echo "$msg" | grep -qE '^(feat|fix|refactor|docs|test|chore|ci|style|perf|build|revert)(\(.+\))?: .+'; then
          echo "ERROR: Commit message must follow Conventional Commits format:"
          echo "  <type>(<scope>): <subject>"
          echo ""
          echo "  Types: feat, fix, refactor, docs, test, chore, ci, style, perf, build, revert"
          echo ""
          echo "  Got: $msg"
          exit 1
        fi
